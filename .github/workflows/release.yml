name: Release (Docker Hub)

# On a version tag (e.g. v1.0.0) → build the image and push it to Docker Hub.
#
# 🔒 SÉCURITÉ (Docker Hub public) : l'image ne contient AUCUN secret. Le build
# n'a besoin d'aucun secret applicatif — seulement des identifiants Docker Hub
# pour POUSSER l'image. Ne jamais passer de pseudo/token en build-arg ou ENV :
# ils resteraient inspectables (`docker history`) sur un repo public.
#
# Secrets GitHub requis (Settings → Secrets → Actions) :
#   - DOCKERHUB_USERNAME : ton identifiant Docker Hub
#   - DOCKERHUB_TOKEN    : un access token Docker Hub (PAS ton mot de passe)
#
# Déclencher : git tag v1.0.0 && git push origin v1.0.0

on:
  push:
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/iwanesko-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
