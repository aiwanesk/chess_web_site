name: Tactics (weekly)

# Chaque lundi matin : génère les tactiques de la semaine (parties d'Alexandre +
# Stockfish), les commit (anonymisées), puis reconstruit l'image → l'article
# /tactiques/JJ-MM-AA part en ligne. Déclenchable aussi à la main (workflow_dispatch).
#
# Secrets GitHub requis (Settings → Secrets → Actions) — PRIVÉS, jamais publiés :
#   CHESSCOM_USERNAME, LICHESS_USERNAME, (LICHESS_TOKEN facultatif),
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

on:
  schedule:
    - cron: '0 5 * * 1' # lundi 05:00 UTC ≈ 6-7h à Genève (UTC, sans heure d'été)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Install Stockfish
        run: sudo apt-get update && sudo apt-get install -y stockfish

      - name: Generate the week's puzzles
        working-directory: backend
        env:
          CHESSCOM_USERNAME: ${{ secrets.CHESSCOM_USERNAME }}
          LICHESS_USERNAME: ${{ secrets.LICHESS_USERNAME }}
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
          STOCKFISH_PATH: stockfish
          TACTICS_DIR: ../content/tactiques
          MOVETIME_MS: '400'
          MAX_GAMES: '60'
        run: go run ./cmd/tactics

      - name: Commit puzzles (if any new)
        id: commit
        run: |
          git config user.name "tactics-bot"
          git config user.email "noreply@iwanesko.ch"
          git add content/tactiques
          if git diff --cached --quiet; then
            echo "Rien de nouveau."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(tactics): puzzles de la semaine [skip ci]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Reconstruit l'image seulement s'il y a du nouveau → l'article passe en ligne.
      - name: Set up Buildx
        if: steps.commit.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.commit.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        if: steps.commit.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            alex42000iwa/chess:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
